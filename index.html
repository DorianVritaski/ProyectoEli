<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para Ti 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- CONTENEDOR PRINCIPAL -->
  <main class="contenedor">

    <!-- REGALO -->
    <section class="regalo-section">
      <input type="checkbox" id="abrir-regalo">

      <label for="abrir-regalo" class="regalo">
        🎁
        <span class="texto-regalo">Haz clic</span>
      </label>

      <div class="mensaje-inicial">
        <h1>Este regalo no se envuelve, se siente 💖</h1>
        <p>
          Cada recuerdo contigo es una parte de mi felicidad.
          Gracias por darme la oportunidad de conocerte y enamorarme de ti✨
        </p>
      </div>
    </section>

    <!-- GALERÍA (por ahora vacía) -->
    <section class="galeria oculto" id="galeria">
      <h2>Nuestros Recuerdos 📸</h2>
      <div class="grid-galeria" id="grid-galeria">
        <!-- Aquí luego se cargan las fotos desde Firebase -->
      </div>
    </section>

    <section class="formulario oculto" id="formulario">
      <h2>Agregar un nuevo recuerdo 💕</h2>
    
      <form id="form-recuerdo">
        <input type="file" id="foto" accept="image/*" required>
    
        <input type="text" id="mensaje" placeholder="Mensaje del recuerdo 💖" required>
    
        <input type="date" id="fecha" required>
    
        <button type="submit">Subir recuerdo 📸</button>
      </form>
    </section>

    <!-- MODAL (Ventana Flotante) -->
    <div id="modal" class="modal oculto">
      <div class="modal-contenido">
        <span class="cerrar-modal">&times;</span>
        <img id="modal-img" src="" alt="Recuerdo grande">
        <p id="modal-mensaje"></p>
        <span id="modal-fecha" class="fecha-modal"></span>
      </div>
    </div>

    <!-- MODAL DE EDICIÓN -->
    <div id="edit-modal" class="modal oculto">
      <div class="modal-contenido">
        <span class="cerrar-modal">&times;</span>
        <h2>Editar Recuerdo</h2>
        <form id="form-editar-recuerdo">
          <input type="hidden" id="edit-id">
          <input type="text" id="edit-mensaje" placeholder="Mensaje del recuerdo 💖" required>
          <input type="date" id="edit-fecha" required>
          <button type="submit">Guardar Cambios</button>
        </form>
      </div>
    </div>
  </main>

  <!-- JS -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
